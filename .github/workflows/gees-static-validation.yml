name: GEES Static Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate production files
        run: node scripts/check-gees.mjs
      - name: Validate JavaScript syntax
        run: find public_html -type f -name '*.js' -print0 | xargs -0 -n 1 node --check
