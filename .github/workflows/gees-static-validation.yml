name: GEES Static Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: Active portal validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate active production routes
        run: node scripts/check-gees.mjs
      - name: Validate active JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          active_scripts=(
            scripts/check-gees.mjs
            public_html/global.js
            public_html/gees-leads.js
            public_html/gees-router.js
            public_html/sw.js
            public_html/index.js
            public_html/index-search.js
            public_html/homepage-counter-fallback.js
            public_html/public-link-normalizer.js
            public_html/portal/shared/js/supabase-client.js
            public_html/portal/shared/js/auth-service.js
            public_html/portal/shared/js/auth-page.js
            public_html/portal/shared/js/role-guard.js
            public_html/portal/shared/js/portal-shell.js
            public_html/portal/shared/js/portal-ui.js
            public_html/portal/shared/js/portal-live-data.js
            public_html/portal/shared/js/portal-crud.js
            public_html/portal/shared/js/portal-document-upload.js
            public_html/portal/shared/js/portal-workflow.js
            public_html/portal/shared/js/portal-commissions.js
            public_html/portal/shared/js/portal-work-items.js
            public_html/portal/shared/js/portal-reports.js
          )
          for file in "${active_scripts[@]}"; do
            test -f "$file"
            node --check "$file"
          done
