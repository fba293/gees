<style>
    :root {
      --cx-max: min(1220px, calc(100vw - 32px));
      --cx-bg: #f7f9fc;
      --cx-bg-2: #edf3fb;
      --cx-text: #071326;
      --cx-soft: #334155;
      --cx-muted: #64748b;
      --cx-surface: rgba(255, 255, 255, .78);
      --cx-surface-strong: rgba(255, 255, 255, .96);
      --cx-border: rgba(15, 23, 42, .11);
      --cx-border-strong: rgba(15, 23, 42, .18);
      --cx-blue: #2563eb;
      --cx-blue-2: #0b4cc1;
      --cx-navy: #003366;
      --cx-gold: #d9a400;
      --cx-gold-2: #ffd700;
      --cx-green: #006a4e;
      --cx-red: #e2132e;
      --cx-shadow-sm: 0 1px 2px rgba(15, 23, 42, .05), inset 0 1px 0 rgba(255, 255, 255, .72);
      --cx-shadow-md: 0 22px 60px rgba(15, 23, 42, .11), inset 0 1px 0 rgba(255,255,255,.76);
      --cx-shadow-lg: 0 34px 92px rgba(15, 23, 42, .16), 0 8px 24px rgba(15, 23, 42, .08);
      --cx-radius-sm: 18px;
      --cx-radius-md: 26px;
      --cx-radius-lg: 34px;
      --cx-radius-xl: 44px;
      --cx-ease: cubic-bezier(.2, .8, .2, 1);
      --cx-ease-spring: cubic-bezier(.18, .89, .32, 1.28);
    }

    [data-theme="dark"] {
      --cx-bg: #030712;
      --cx-bg-2: #0b1220;
      --cx-text: #f8fafc;
      --cx-soft: #cbd5e1;
      --cx-muted: #94a3b8;
      --cx-surface: rgba(15, 23, 42, .72);
      --cx-surface-strong: rgba(15, 23, 42, .94);
      --cx-border: rgba(255, 255, 255, .12);
      --cx-border-strong: rgba(255, 255, 255, .20);
      --cx-blue: #60a5fa;
      --cx-blue-2: #93c5fd;
      --cx-navy: #8bbcff;
      --cx-gold: #ffd700;
      --cx-gold-2: #fde68a;
      --cx-green: #34d399;
      --cx-shadow-sm: 0 1px 2px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.06);
      --cx-shadow-md: 0 24px 70px rgba(0,0,0,.36), inset 0 1px 0 rgba(255,255,255,.07);
      --cx-shadow-lg: 0 38px 110px rgba(0,0,0,.52), inset 0 1px 0 rgba(255,255,255,.08);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--cx-text);
      background:
        radial-gradient(circle at 8% 8%, rgba(37, 99, 235, .16), transparent 30rem),
        radial-gradient(circle at 90% 10%, rgba(255, 215, 0, .18), transparent 28rem),
        radial-gradient(circle at 50% 100%, rgba(0, 106, 78, .10), transparent 28rem),
        linear-gradient(180deg, var(--cx-bg), var(--cx-bg-2));
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -3;
      pointer-events: none;
      opacity: .82;
      background-image:
        linear-gradient(rgba(100,116,139,.075) 1px, transparent 1px),
        linear-gradient(90deg, rgba(100,116,139,.075) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, #000, transparent 78%);
    }

    a { color: inherit; }
    button, input, select, textarea { font: inherit; }
    button, a { -webkit-tap-highlight-color: transparent; }
    :focus-visible { outline: 3px solid color-mix(in srgb, var(--cx-gold), transparent 25%); outline-offset: 4px; border-radius: 13px; }

    .skip-link {
      position: fixed;
      left: 16px;
      top: -60px;
      z-index: 99999;
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--cx-text);
      color: var(--cx-bg);
      text-decoration: none;
      font-weight: 900;
      transition: top 180ms var(--cx-ease);
    }
    .skip-link:focus { top: 14px; }

    .cx-page {
      width: var(--cx-max);
      margin-inline: auto;
      padding-top: var(--gees-header-safe, 112px);
    }

    .cx-glow {
      position: fixed;
      top: 0;
      left: 0;
      width: 760px;
      height: 760px;
      pointer-events: none;
      z-index: -1;
      opacity: .34;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(37, 99, 235, .17), rgba(255, 215, 0, .11) 42%, transparent 70%);
      transform: translate(calc(var(--x, -1000px) - 50%), calc(var(--y, -1000px) - 50%));
      will-change: transform;
    }

    .glass {
      position: relative;
      border: 1px solid var(--cx-border);
      background: var(--cx-surface);
      box-shadow: var(--cx-shadow-md);
      backdrop-filter: blur(24px) saturate(1.25);
      -webkit-backdrop-filter: blur(24px) saturate(1.25);
      overflow: hidden;
    }
    .glass::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: inherit;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.68), inset 0 -1px 0 rgba(15,23,42,.04);
    }
    [data-theme="dark"] .glass::before { box-shadow: inset 0 1px 0 rgba(255,255,255,.08); }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      width: fit-content;
      padding: 8px 13px;
      border-radius: 999px;
      border: 1px solid var(--cx-border);
      background: var(--cx-surface-strong);
      box-shadow: var(--cx-shadow-sm);
      color: var(--cx-navy);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .09em;
      text-transform: uppercase;
    }
    [data-theme="dark"] .eyebrow { color: var(--cx-gold); }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .contact-stage {
      min-height: calc(100svh - var(--gees-header-safe, 112px));
      display: grid;
      grid-template-columns: minmax(430px, .98fr) minmax(490px, 1.02fr);
      gap: clamp(16px, 2.4vw, 30px);
      align-items: stretch;
      padding: clamp(16px, 3vw, 38px) 0 clamp(24px, 4vw, 46px);
    }

    .contact-video-card,
    .contact-form-card { border-radius: var(--cx-radius-xl); }

    .contact-video-card {
      position: relative;
      min-height: 100%;
      display: grid;
      overflow: hidden;
      background:
        radial-gradient(circle at 15% 12%, rgba(255, 215, 0, .24), transparent 26rem),
        linear-gradient(145deg, #dcecff, #f7fbff);
    }

    [data-theme="dark"] .contact-video-card {
      background:
        radial-gradient(circle at 15% 12%, rgba(255, 215, 0, .16), transparent 26rem),
        linear-gradient(145deg, #061225, #0f172a);
    }

    .contact-video-wrap {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(0, 51, 102, .08), rgba(255, 215, 0, .10)),
        url("https://globaleducationexpert.com/contact-form-animation-poster.jpg") center / cover no-repeat;
    }

    .contact-video {
      width: 100%;
      height: 100%;
      min-height: 520px;
      object-fit: cover;
      display: block;
      background: transparent;
      transform: scale(1.008);
    }

    .video-soft-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(2, 8, 23, .03), transparent 30%, rgba(2, 8, 23, .14)),
        radial-gradient(circle at 18% 12%, rgba(255,255,255,.42), transparent 18rem);
    }

    [data-theme="dark"] .video-soft-overlay {
      background:
        linear-gradient(180deg, rgba(2, 8, 23, .08), transparent 30%, rgba(2, 8, 23, .42)),
        radial-gradient(circle at 18% 12%, rgba(255,255,255,.12), transparent 18rem);
    }

    .video-overlay-card { display: none !important; }

    .video-play-btn {
      position: absolute;
      top: 18px;
      right: 18px;
      z-index: 4;
      display: none;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255,255,255,.52);
      border-radius: 999px;
      padding: 10px 12px;
      background: rgba(255,255,255,.78);
      color: #071326;
      font-size: 12px;
      font-weight: 900;
      box-shadow: var(--cx-shadow-sm);
      backdrop-filter: blur(14px);
      cursor: pointer;
    }
    .video-play-btn.is-visible { display: inline-flex; }

    .contact-form-card {
      padding: clamp(20px, 2.45vw, 30px);
      display: grid;
      align-content: center;
      background: color-mix(in srgb, var(--cx-surface-strong), transparent 4%);
      border: 1px solid var(--cx-border);
      box-shadow: var(--cx-shadow-md);
    }

    .form-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(96px, auto);
      gap: 16px;
      align-items: start;
      margin-bottom: 16px;
    }

    .form-head h1 {
      margin: 12px 0 0;
      max-width: 530px;
      font-size: clamp(2.05rem, 4vw, 3.8rem);
      line-height: .9;
      letter-spacing: -.078em;
      font-weight: 900;
    }

    .progress-wrap {
      width: 108px;
      min-width: 108px;
      display: grid;
      gap: 8px;
      justify-items: end;
      color: var(--cx-muted);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding-top: 6px;
    }

    .progress-track {
      width: 108px;
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: color-mix(in srgb, var(--cx-muted), transparent 84%);
    }

    .progress-fill {
      display: block;
      width: var(--progress, 0%);
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--cx-blue), var(--cx-gold), var(--cx-green));
      transition: width 360ms var(--cx-ease);
    }

    .smart-form { display: grid; gap: 14px; }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .field { position: relative; }
    .field.full { grid-column: 1 / -1; }

    .field-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 1;
      color: var(--cx-navy);
      font-size: 1rem;
      pointer-events: none;
    }
    [data-theme="dark"] .field-icon { color: var(--cx-gold); }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border: 1px solid var(--cx-border);
      border-radius: 999px;
      background: var(--cx-surface-strong);
      color: var(--cx-text);
      padding: 17px 18px 17px 52px;
      outline: 0;
      font-size: 15px;
      min-height: 54px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.42);
      transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms var(--cx-ease), background 180ms ease;
      appearance: none;
    }

    .field select {
      padding-right: 44px;
      background-image: linear-gradient(45deg, transparent 50%, var(--cx-muted) 50%), linear-gradient(135deg, var(--cx-muted) 50%, transparent 50%);
      background-position: calc(100% - 22px) 50%, calc(100% - 16px) 50%;
      background-size: 7px 7px, 7px 7px;
      background-repeat: no-repeat;
    }

    .field textarea {
      border-radius: 28px;
      min-height: 104px;
      resize: vertical;
      padding-top: 19px;
      line-height: 1.5;
    }

    .field input::placeholder,
    .field textarea::placeholder { color: color-mix(in srgb, var(--cx-muted), transparent 7%); }

    .field:focus-within input,
    .field:focus-within select,
    .field:focus-within textarea {
      border-color: color-mix(in srgb, var(--cx-blue), transparent 40%);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--cx-blue), transparent 83%), inset 0 1px 0 rgba(255,255,255,.42);
      transform: translateY(-1px);
    }

    .field-note { color: var(--cx-muted); font-size: 12px; line-height: 1.55; }
    .char-count { position: absolute; right: 18px; bottom: 12px; color: var(--cx-muted); font-size: 11px; font-weight: 800; }

    .btn {
      min-height: 50px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 18px;
      border-radius: 999px;
      border: 1px solid transparent;
      text-decoration: none;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
      transition: transform 260ms var(--cx-ease-spring), box-shadow 220ms ease, background 180ms ease, border-color 180ms ease;
      will-change: transform;
    }
    .btn:hover { transform: translate3d(0, -2px, 0); }
    .btn:active { transform: translate3d(0, 1px, 0) scale(.985); }
    .btn-primary { color: #fff; background: linear-gradient(135deg, var(--cx-navy), var(--cx-blue)); box-shadow: 0 18px 38px rgba(37,99,235,.25); }
    .btn-secondary { color: var(--cx-text); background: var(--cx-surface-strong); border-color: var(--cx-border); box-shadow: var(--cx-shadow-sm); }
    .btn-ghost { color: var(--cx-text); background: transparent; border-color: var(--cx-border); }

    .form-footer { display: grid; gap: 10px; padding-top: 2px; }
    .form-footer .btn { width: 100%; }

    .mini-route-note {
      margin: 0;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      color: var(--cx-muted);
      font-size: 12px;
      font-weight: 800;
    }
    .mini-route-note i { color: var(--cx-gold); }

    .office-route {
      position: relative;
      padding: clamp(14px, 2vw, 20px);
      border-radius: var(--cx-radius-xl);
      margin-bottom: clamp(50px, 7vw, 88px);
    }

    .office-route::after {
      content: "";
      position: absolute;
      inset: -1px;
      pointer-events: none;
      border-radius: inherit;
      background:
        radial-gradient(circle at 10% 8%, rgba(37,99,235,.12), transparent 20rem),
        radial-gradient(circle at 90% 18%, rgba(255,215,0,.16), transparent 20rem);
      z-index: -1;
    }

    .office-route-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
      gap: 18px;
      padding: clamp(10px, 2vw, 18px) clamp(10px, 2vw, 18px) clamp(16px, 2vw, 22px);
    }

    .office-route-head h2 {
      margin: 14px 0 0;
      max-width: 680px;
      font-size: clamp(2.15rem, 5vw, 4.8rem);
      line-height: .9;
      letter-spacing: -.075em;
    }

    .route-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid var(--cx-border);
      background: var(--cx-surface-strong);
      color: var(--cx-muted);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
      box-shadow: var(--cx-shadow-sm);
    }

    .office-mapline {
      position: relative;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      padding: 2px;
    }

    .office-mapline::before {
      content: "";
      position: absolute;
      left: 18%;
      right: 18%;
      top: 50%;
      height: 2px;
      pointer-events: none;
      background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--cx-blue), transparent 52%), color-mix(in srgb, var(--cx-gold), transparent 42%), transparent);
      z-index: 0;
    }

    .office-pass {
      position: relative;
      z-index: 1;
      min-height: 330px;
      display: grid;
      grid-template-columns: 132px minmax(0, 1fr);
      border-radius: 34px;
      overflow: hidden;
      border: 1px solid var(--cx-border);
      background: linear-gradient(135deg, color-mix(in srgb, var(--cx-surface-strong), transparent 4%), color-mix(in srgb, var(--cx-surface), transparent 10%));
      box-shadow: var(--cx-shadow-md);
      isolation: isolate;
      transition: transform 260ms var(--cx-ease-spring), box-shadow 220ms ease, border-color 180ms ease;
    }

    .office-pass:hover { transform: translateY(-5px); box-shadow: var(--cx-shadow-lg); border-color: var(--cx-border-strong); }

    .office-pass::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 132px;
      width: 1px;
      background-image: linear-gradient(to bottom, var(--cx-border) 45%, transparent 0%);
      background-size: 1px 14px;
      z-index: 2;
    }

    .office-pass::after {
      content: "";
      position: absolute;
      right: 20px;
      top: 20px;
      width: 76px;
      height: 76px;
      opacity: .08;
      background:
        linear-gradient(90deg, var(--cx-text) 4px, transparent 4px) 0 0 / 11px 11px,
        linear-gradient(var(--cx-text) 4px, transparent 4px) 0 0 / 11px 11px;
      border-radius: 16px;
      z-index: 0;
    }

    .pass-stamp {
      position: relative;
      display: grid;
      align-content: space-between;
      gap: 18px;
      padding: 22px 16px;
      color: #fff;
      background:
        radial-gradient(circle at 22% 14%, rgba(255,255,255,.20), transparent 9rem),
        linear-gradient(160deg, var(--cx-navy), var(--cx-blue) 56%, var(--cx-green));
      overflow: hidden;
    }

    .pass-stamp::before {
      content: "";
      position: absolute;
      inset: 14px;
      border: 1px dashed rgba(255,255,255,.34);
      border-radius: 22px;
      pointer-events: none;
    }

    .pass-flag { position: relative; z-index: 1; font-size: 3rem; line-height: 1; filter: drop-shadow(0 10px 16px rgba(0,0,0,.18)); }
    .pass-code {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 6px;
      color: rgba(255,255,255,.88);
      font-size: 11px;
      font-weight: 950;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .pass-code strong { color: #fff; font-size: 1.8rem; line-height: .9; letter-spacing: -.06em; }

    .pass-body {
      position: relative;
      z-index: 1;
      display: grid;
      align-content: space-between;
      gap: 26px;
      padding: clamp(22px, 3vw, 30px);
    }

    .pass-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid var(--cx-border);
      color: var(--cx-muted);
      background: color-mix(in srgb, var(--cx-surface-strong), transparent 12%);
      font-size: 11px;
      font-weight: 950;
      letter-spacing: .06em;
      text-transform: uppercase;

    @media (max-width: 1120px) {

    /* Contact page targeted fixes */

    @supports (-webkit-touch-callout: none) {

<script>
    (() => {
      'use strict';

      const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      const $ = (selector, root = document) => root.querySelector(selector);
      const $$ = (selector, root = document) => Array.from(root.querySelectorAll(selector));

      const form = $('#smartContactForm');
      const requiredFields = ['studentName', 'studentPhone', 'studyLevel', 'studyDestination', 'academicQualification', 'applyTiming', 'consultationMode'];
      const progressFill = $('#progressFill');
      const progressText = $('#progressText');
      const message = $('#studentMessage');
      const charCount = $('#charCount');
      const toast = $('#contactToast');
      const thankYouModal = $('#thankYouModal');
      const thankYouClose = $('#thankYouClose');
      const thankYouDone = $('#thankYouDone');
      const thankYouReset = $('#thankYouReset');
      const thankYouOpenAgain = $('#thankYouOpenAgain');
      const video = $('#contactAnimationVideo');
      const videoPlayBtn = $('#videoPlayBtn');
      const videoWrap = video?.closest('.contact-video-wrap');
      const attributionStorageKey = 'gees_contact_attribution';
      const leadBackupKey = 'gees_last_contact_lead';
      const attributionKeys = ['utm_source', 'utm_medium', 'utm_campaign', 'utm_content', 'utm_term', 'gclid', 'fbclid'];

      function updateProgress() {
        if (!form) return;
        const data = new FormData(form);
        const filled = requiredFields.filter(name => String(data.get(name) || '').trim()).length;
        const messageBonus = String(data.get('studentMessage') || '').trim().length > 18 ? 1 : 0;
        const englishBonus = String(data.get('englishProficiency') || '').trim() || String(data.get('overallScore') || '').trim() ? 1 : 0;
        const total = requiredFields.length + 2;
        const percent = Math.min(100, Math.round(((filled + messageBonus + englishBonus) / total) * 100));
        if (progressFill) progressFill.style.setProperty('--progress', percent + '%');
        if (progressText) progressText.textContent = percent + '% ready';
      }

      function showToast(text) {
        if (!toast) return;
        toast.textContent = text;
        toast.classList.add('show');
        window.setTimeout(() => toast.classList.remove('show'), 2400);
      }

      function readStoredAttribution() {
        try { return JSON.parse(sessionStorage.getItem(attributionStorageKey) || '{}'); } catch (error) { return {}; }
      }

      function writeStoredAttribution(attribution) {
        try { sessionStorage.setItem(attributionStorageKey, JSON.stringify(attribution)); } catch (error) {}
      }

      function captureAttribution() {
        const params = new URLSearchParams(window.location.search);
        const attribution = readStoredAttribution();
        attributionKeys.forEach(key => {
          const value = params.get(key);
          if (value) attribution[key] = value;
        });
        attribution.referrer = attribution.referrer || document.referrer || '';
        attribution.landing_page = attribution.landing_page || window.location.href;
        attribution.current_page = window.location.href;
        attribution.captured_at = attribution.captured_at || new Date().toISOString();
        writeStoredAttribution(attribution);

        Object.entries(attribution).forEach(([key, value]) => {
          const input = document.getElementById(key);
          if (input) input.value = value || '';
        });
        return attribution;
      }

      captureAttribution();

      form?.addEventListener('input', () => {
        if (message && charCount) charCount.textContent = String(message.value.length);
        updateProgress();
      });
      form?.addEventListener('change', updateProgress);
      updateProgress();

      function getTeam(destination, phone, consultationMode) {
        const phoneDigits = String(phone || '').replace(/[^0-9]/g, '');
        const destinationKey = String(destination || '').toLowerCase();
        const modeKey = String(consultationMode || '').toLowerCase();
        return destinationKey.includes('malaysia') || phoneDigits.startsWith('60') || modeKey.includes('malaysia') ? '601112376224' : '8801805529578';
      }

      function buildLeadPayload(data, team, waUrl) {
        return {
          source: 'contact-us',
          submitted_at: new Date().toISOString(),
          routed_team: team === '601112376224' ? 'Malaysia' : 'Bangladesh',
          whatsapp_url: waUrl,
          studentName: String(data.get('studentName') || '').trim(),
          studentPhone: String(data.get('studentPhone') || '').trim(),
          studentEmail: String(data.get('studentEmail') || '').trim(),
          studyLevel: String(data.get('studyLevel') || '').trim(),
          studyDestination: String(data.get('studyDestination') || '').trim(),
          academicQualification: String(data.get('academicQualification') || '').trim(),
          englishProficiency: String(data.get('englishProficiency') || '').trim(),
          overallScore: String(data.get('overallScore') || '').trim(),
          applyTiming: String(data.get('applyTiming') || '').trim(),
          consultationMode: String(data.get('consultationMode') || '').trim(),
          studentMessage: String(data.get('studentMessage') || '').trim(),
          attribution: captureAttribution(),
          user_agent: navigator.userAgent,
          viewport: `${window.innerWidth}x${window.innerHeight}`
        };
      }

      function queueLeadSave(payload) {
        try { localStorage.setItem(leadBackupKey, JSON.stringify(payload)); } catch (error) {}
        const endpoint = String(window.GEES_LEAD_ENDPOINT || '').trim();
        if (!endpoint) return false;
        const body = JSON.stringify(payload);
        try {
          if (navigator.sendBeacon) {
            const blob = new Blob([body], { type: 'text/plain;charset=UTF-8' });
            navigator.sendBeacon(endpoint, blob);
            return true;
          }
        } catch (error) {}
        try {
          fetch(endpoint, { method: 'POST', mode: 'no-cors', keepalive: true, headers: { 'Content-Type': 'text/plain;charset=UTF-8' }, body }).catch(() => {});
          return true;
        } catch (error) { return false; }
      }

      function showThankYou(waUrl, opened) {
        if (thankYouOpenAgain) thankYouOpenAgain.href = waUrl;
        if (thankYouModal) {
          thankYouModal.hidden = false;
          requestAnimationFrame(() => thankYouModal.classList.add('is-open'));
        }
        showToast(opened ? 'WhatsApp opened. Please tap send.' : 'Tap Open WhatsApp again if it was blocked.');
      }

      function closeThankYou() {
        if (!thankYouModal) return;
        thankYouModal.classList.remove('is-open');
        window.setTimeout(() => { thankYouModal.hidden = true; }, 260);
      }

      thankYouClose?.addEventListener('click', closeThankYou);
      thankYouDone?.addEventListener('click', closeThankYou);
      thankYouModal?.addEventListener('click', (event) => { if (event.target === thankYouModal) closeThankYou(); });
      thankYouReset?.addEventListener('click', () => {
        form?.reset();
        if (charCount) charCount.textContent = '0';
        updateProgress();
        captureAttribution();
        closeThankYou();
      });
      document.addEventListener('keydown', (event) => { if (event.key === 'Escape') closeThankYou(); });

      form?.addEventListener('submit', (event) => {
        event.preventDefault();
        if (!form.checkValidity()) {
          form.reportValidity();
          return;
        }
        const data = new FormData(form);
        const name = String(data.get('studentName') || '').trim();
        const phone = String(data.get('studentPhone') || '').trim();
        const email = String(data.get('studentEmail') || '').trim() || 'Not provided';
        const level = String(data.get('studyLevel') || '').trim();
        const destination = String(data.get('studyDestination') || '').trim();
        const qualification = String(data.get('academicQualification') || '').trim();
        const english = String(data.get('englishProficiency') || '').trim() || 'Not provided';
        const score = String(data.get('overallScore') || '').trim() || 'Not provided';
        const timing = String(data.get('applyTiming') || '').trim();
        const mode = String(data.get('consultationMode') || '').trim();
        const note = String(data.get('studentMessage') || '').trim() || 'Please check my eligibility and guide me.';
        const team = getTeam(destination, phone, mode);
        const text = [
          `Hi GEES, my name is ${name}.`,
          `Phone/WhatsApp: ${phone}.`,
          `Email: ${email}.`,
          `I want to study in ${destination} at ${level} level.`,
          `Academic qualification: ${qualification}.`,
          `English proficiency: ${english}. Overall score: ${score}.`,
          `Timeline: ${timing}. Consultation mode: ${mode}.`,
          note
        ].join(' ');
        const waUrl = `https://wa.me/${team}?text=${encodeURIComponent(text)}`;
        const payload = buildLeadPayload(data, team, waUrl);
        queueLeadSave(payload);
        showToast('Opening WhatsApp…');
        const openedWindow = window.open(waUrl, '_blank', 'noopener');
        showThankYou(waUrl, !!openedWindow);
      });

      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      const isSafari = /^((?!chrome|android|crios|fxios|edgios).)*safari/i.test(navigator.userAgent);
      const isAndroid = /Android/i.test(navigator.userAgent);
      const isChromeLike = /Chrome|CriOS|Chromium|Edg|OPR/i.test(navigator.userAgent) && !isSafari;
      let videoSources = [];
      let videoSourceIndex = 0;

      function sourceCanPlay(type) {
        if (!video) return false;
        return Boolean(video.canPlayType(type).replace('no', ''));
      }

      function buildVideoSources() {
        if (!video) return [];
        const mp4 = video.dataset.srcMp4 || 'contact-form-animation.mp4';
        const mp4Local = video.dataset.srcMp4Local || '/contact-form-animation.mp4';
        const mp4Absolute = video.dataset.srcMp4Absolute || 'https://globaleducationexpert.com/contact-form-animation.mp4';
        const webm = video.dataset.srcWebm || '/contact-form-animation.webm';
        if (isIOS || isSafari) return [mp4, mp4Local, mp4Absolute];
        if (isAndroid && isChromeLike && (sourceCanPlay('video/webm; codecs="vp9"') || sourceCanPlay('video/webm'))) return [webm, mp4, mp4Local, mp4Absolute];
        return [mp4, mp4Local, mp4Absolute];
      }

      function markVideoReady() {
        if (!video) return;
        if (videoWrap) videoWrap.dataset.videoReady = 'true';
        videoPlayBtn?.classList.remove('is-visible');
      }

      function setVideoSource(index = 0) {
        if (!video) return;
        videoSourceIndex = index;
        const src = videoSources[videoSourceIndex];
        if (!src || video.dataset.activeSrc === src) return;
        video.dataset.activeSrc = src;
        video.setAttribute('src', src);
        video.src = src;
        try {
          video.load();
        } catch (error) {}
      }

      async function tryPlayVideo() {
        if (!video || reduceMotion) return;
        video.muted = true;
        video.defaultMuted = true;
        video.playsInline = true;
        video.autoplay = true;
        video.loop = true;
        video.setAttribute('muted', '');
        video.setAttribute('playsinline', '');
        video.setAttribute('webkit-playsinline', '');
        video.setAttribute('preload', 'auto');
        if (!videoSources.length) {
          videoSources = buildVideoSources();
          setVideoSource(0);
        }
        try {
          await video.play();
          markVideoReady();
        } catch (error) {
          videoPlayBtn?.classList.add('is-visible');
        }
      }

      if (video) {
        ['loadedmetadata', 'loadeddata', 'canplay', 'playing'].forEach(eventName => {
          video.addEventListener(eventName, markVideoReady, { once: true });
        });
        video.addEventListener('error', () => {
          if (videoSourceIndex + 1 < videoSources.length) {
            setVideoSource(videoSourceIndex + 1);
            tryPlayVideo();
          } else {
            videoPlayBtn?.classList.add('is-visible');
          }
        });
      }

      videoPlayBtn?.addEventListener('click', tryPlayVideo);
      window.addEventListener('DOMContentLoaded', tryPlayVideo);
      window.addEventListener('load', tryPlayVideo);
      window.addEventListener('pageshow', tryPlayVideo);
      ['touchstart', 'pointerdown'].forEach(eventName => {
        window.addEventListener(eventName, tryPlayVideo, { once: true, passive: true });
      });
      document.addEventListener('visibilitychange', () => { if (!document.hidden) tryPlayVideo(); });

      if (!reduceMotion && 'IntersectionObserver' in window) {
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (!entry.isIntersecting) return;
            entry.target.classList.add('is-visible');
            observer.unobserve(entry.target);
          });
        }, { threshold: .12, rootMargin: '70px' });
        $$('.reveal:not(.is-visible)').forEach(el => observer.observe(el));
      } else {
        $$('.reveal').forEach(el => el.classList.add('is-visible'));
      }

      const glow = $('#contactGlow');
      if (glow && !reduceMotion) {
        window.addEventListener('pointermove', (event) => {
          glow.style.setProperty('--x', event.clientX + 'px');
          glow.style.setProperty('--y', event.clientY + 'px');
        }, { passive: true });
      }

      const loadScript = (primary, fallbackPath) => new Promise(resolve => {
        const script = document.createElement('script');
        script.src = primary;
        script.defer = true;
        script.onload = resolve;
        script.onerror = () => {
          if (!fallbackPath) { resolve(); return; }
          const alt = document.createElement('script');
          alt.src = fallbackPath;
          alt.defer = true;
          alt.onload = resolve;
          alt.onerror = resolve;
          document.body.appendChild(alt);
        };
        document.body.appendChild(script);
      });

      loadScript('header.js', '/header.js')
        .then(() => loadScript('footer.js', '/footer.js'))
        .then(() => loadScript('global.js', '/global.js'));
    })();
  </script>
