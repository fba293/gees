<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apply Online | GEES</title>
<link rel="stylesheet" href="/global.css">
</head>
<body>
<div id="gees-header-placeholder"></div>
<main id="gees-pjax-root" data-page="apply-online">
<section class="gees-page-hero">
  <div><span class="gees-kicker">Phase 18</span><h1>Apply Online</h1><p>Submit your study abroad interest directly to GEES.</p></div>
</section>
<form class="gees-crud-form" data-gees-public-form="apply_online">
  <label>Full Name<input name="full_name" required></label>
  <label>Email<input type="email" name="email" required></label>
  <label>Phone<input name="phone"></label>
  <label>Preferred Country<input name="preferred_country"></label>
  <label>Message<textarea name="message"></textarea></label>
  <button type="submit">Submit Application Interest</button>
  <div data-public-form-status></div>
</form>
</main>
<div id="gees-footer-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/portal/shared/js/supabase-client.js?v=13.0.0"></script>
<script src="/assets/js/gees-public-forms.js?v=13.0.0"></script>
<script src="/header.js"></script>
<script src="/footer.js"></script>
</body>
</html>
