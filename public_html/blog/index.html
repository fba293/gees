window.GEESBlogImageFallback=function(img){try{const list=JSON.parse(img.dataset.candidates||'[]');let i=Number(img.dataset.index||0)+1;if(list[i]){img.dataset.index=String(i);img.src=list[i];return}}catch(e){}img.style.display='none';const p=img.closest('.blog-image-cell');const f=p&&p.querySelector('.blog-image-fallback');if(f)f.style.display='grid'};
function fillSelect(select,values,label){select.innerHTML='<option value="">All '+label+'</option>'+values.map(v=>`<option value="${esc(v)}">${esc(v)}</option>`).join('')}
function initFilters(){fillSelect($('#topicFilter'),TOPICS,'topics');fillSelect($('#topTopicFilter'),TOPICS,'topics');fillSelect($('#authorFilter'),AUTHORS,'authors');const priority=['Malaysia','Study in Malaysia','Courses in Malaysia','Universities in Malaysia','Visa','Accommodation','Technology','Guide'];const chips=priority.filter(x=>TOPICS.includes(x)).concat(TOPICS.filter(x=>!priority.includes(x)).slice(0,3));$('#quickTopics').innerHTML=chips.map(t=>`<button class="topic-chip" type="button" data-topic="${esc(t)}">${esc(t)}</button>`).join('')}
function applyFilters(reset=true){if(reset)state.page=1;const q=norm(state.query);let list=state.master.filter(item=>{const hay=norm([item.title,item.preview,item.topic,item.author].join(' '));if(q&&!q.split(/\s+/).every(t=>hay.includes(t)))return false;if(state.topic&&item.topic!==state.topic)return false;if(state.author&&item.author!==state.author)return false;return true});if(state.sort==='title-asc')list.sort((a,b)=>a.title.localeCompare(b.title));else if(state.sort==='author-asc')list.sort((a,b)=>a.author.localeCompare(b.author)||a.title.localeCompare(b.title));else if(state.sort==='topic-asc')list.sort((a,b)=>a.topic.localeCompare(b.topic)||a.title.localeCompare(b.title));state.filtered=list;render()}
function render(){const total=state.filtered.length;const pages=Math.max(1,Math.ceil(total/state.perPage));if(state.page>pages)state.page=pages;const start=(state.page-1)*state.perPage;const page=state.filtered.slice(start,start+state.perPage);$('#totalCount').textContent=total;const active=[state.query&&`Search: “${esc(state.query)}”`,state.topic&&`Topic: ${esc(state.topic)}`,state.author&&`Author: ${esc(state.author)}`].filter(Boolean).join(' · ');$('#activeFilterNote').innerHTML=(total?`Showing ${start+1}–${Math.min(start+state.perPage,total)} of ${total}`:'No articles found')+(active?' · '+active:' · Use search and filters to shortlist faster.');renderFeatured();$('#blogList').innerHTML=page.length?page.map(rowHTML).join(''):'<div class="empty-state"><div><h3>No articles found</h3><p>Try another keyword, topic, or author.</p></div></div>';renderPagination(pages);updateSchema(page)}
function renderFeatured(){const box=$('#featuredStrip');const item=state.filtered[0];if(!item||state.query||state.topic||state.author||state.page!==1){box.hidden=true;box.innerHTML='';return}const cand=imageCandidates(item);box.hidden=false;box.innerHTML=`<div><span class="blog-pill blog-pill--gold">Featured</span><h3>${esc(item.title)}</h3><p>${esc(item.preview||'Read the latest GEES student guide and study abroad briefing.')}</p><div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:18px"><a class="mini-btn mini-btn--read" href="${esc(item.href)}">Read article</a><button class="mini-btn" type="button" data-feature-details>Preview</button></div></div><a href="${esc(item.href)}"><img src="${esc(cand[0]||'')}" data-candidates='${esc(JSON.stringify(cand))}' data-index="0" alt="${esc(item.alt||item.title)}" onerror="window.GEESBlogImageFallback(this)" loading="eager" decoding="async"></a>`;box.querySelector('[data-feature-details]')?.addEventListener('click',()=>openQuick(item))}
function rowHTML(item){const cand=imageCandidates(item);return `<article class="blog-row" data-id="${esc(item.id)}"><a class="blog-image-cell" href="${esc(item.href)}" aria-label="Read ${esc(item.title)}"><img src="${esc(cand[0]||'')}" data-candidates='${esc(JSON.stringify(cand))}' data-index="0" alt="${esc(item.alt||item.title)}" loading="lazy" decoding="async" onerror="window.GEESBlogImageFallback(this)"><span class="blog-image-fallback">${esc(initials(item.topic))}</span></a><div class="blog-info"><div class="blog-meta"><span class="blog-pill blog-pill--gold">${esc(item.topic||'Guide')}</span><span class="blog-pill">${esc(item.author||'GEES')}</span></div><a class="blog-title" href="${esc(item.href)}">${esc(item.title)}</a><p class="blog-preview">${esc(item.preview||'Open this article for complete guidance and practical study abroad advice.')}</p></div><div class="blog-actions"><a class="mini-btn mini-btn--read" href="${esc(item.href)}">Read</a><button class="mini-btn" type="button" data-action="details">Preview</button></div></article>`}
function renderPagination(pages){const wrap=$('#pagination');if(pages<=1){wrap.innerHTML='';return}let html=`<button class="page-btn" data-page="prev" ${state.page===1?'disabled':''}>‹</button>`;let list=[];for(let p=1;p<=pages;p++){if(p===1||p===pages||Math.abs(p-state.page)<=1)list.push(p)}let last=0;list.forEach(p=>{if(last&&p-last>1)html+='<span class="page-btn" style="display:grid;place-items:center;border-color:transparent">…</span>';html+=`<button class="page-btn ${p===state.page?'is-active':''}" data-page="${p}">${p}</button>`;last=p});html+=`<button class="page-btn" data-page="next" ${state.page===pages?'disabled':''}>›</button>`;wrap.innerHTML=html}
function updateSchema(items){const schema={'@context':'https://schema.org','@type':'ItemList','itemListElement':items.map((it,i)=>({'@type':'ListItem','position':i+1,'url':it.href,'name':it.title}))};let el=$('#blogSchema');if(el)el.textContent=JSON.stringify(schema)}
function openQuick(item){const cand=imageCandidates(item);$('#quickTitle').textContent=item.title;$('#quickBody').innerHTML=`<div class="quick-grid"><div class="blog-image-cell"><img src="${esc(cand[0]||'')}" data-candidates='${esc(JSON.stringify(cand))}' data-index="0" alt="${esc(item.alt||item.title)}" onerror="window.GEESBlogImageFallback(this)"><span class="blog-image-fallback">${esc(initials(item.topic))}</span></div><div><div class="blog-meta"><span class="blog-pill blog-pill--gold">${esc(item.topic||'Guide')}</span><span class="blog-pill">${esc(item.author||'GEES')}</span></div><p style="margin:0;color:var(--b-soft);font-weight:650;line-height:1.7">${esc(item.preview||'Open the full article for complete guidance.')}</p><div style="display:flex;gap:10px;margin-top:18px;flex-wrap:wrap"><a class="mini-btn mini-btn--read" href="${esc(item.href)}">Read article</a><button class="mini-btn" type="button" data-share>Copy link</button></div></div></div>`;$('#quickDrawer').classList.add('is-open');$('#quickDrawer').setAttribute('aria-hidden','false');$('[data-share]')?.addEventListener('click',()=>copyLink(item.href))}
function closeQuick(){$('#quickDrawer').classList.remove('is-open');$('#quickDrawer').setAttribute('aria-hidden','true')}function copyLink(href){const url=new URL(href,location.href).href;navigator.clipboard?.writeText(url).then(()=>toast('Article link copied')).catch(()=>toast('Copy unavailable'))}function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('is-visible');clearTimeout(t._timer);t._timer=setTimeout(()=>t.classList.remove('is-visible'),2200)}
function bind(){$('#mobileFilterToggle').addEventListener('click',()=>$('#filterCard').classList.toggle('is-open'));$('#blogSearch').addEventListener('input',e=>{state.query=e.target.value.trim();applyFilters(true)});$('#topicFilter').addEventListener('change',e=>{state.topic=e.target.value;$('#topTopicFilter').value=state.topic;syncChips();applyFilters(true)});$('#topTopicFilter').addEventListener('change',e=>{state.topic=e.target.value;$('#topicFilter').value=state.topic;syncChips();applyFilters(true)});$('#authorFilter').addEventListener('change',e=>{state.author=e.target.value;applyFilters(true)});$('#sortFilter').addEventListener('change',e=>{state.sort=e.target.value;applyFilters(false)});$('#quickTopics').addEventListener('click',e=>{const b=e.target.closest('[data-topic]');if(!b)return;state.topic=state.topic===b.dataset.topic?'':b.dataset.topic;$('#topicFilter').value=state.topic;$('#topTopicFilter').value=state.topic;syncChips();applyFilters(true)});$('#applyFilters').addEventListener('click',()=>applyFilters(true));$('#resetFilters').addEventListener('click',()=>{Object.assign(state,{query:'',topic:'',author:'',sort:'default',page:1});$('#blogSearch').value='';$('#topicFilter').value='';$('#topTopicFilter').value='';$('#authorFilter').value='';$('#sortFilter').value='default';syncChips();applyFilters(true)});$('#pagination').addEventListener('click',e=>{const b=e.target.closest('[data-page]');if(!b||b.disabled)return;const pages=Math.max(1,Math.ceil(state.filtered.length/state.perPage));if(b.dataset.page==='prev')state.page=Math.max(1,state.page-1);else if(b.dataset.page==='next')state.page=Math.min(pages,state.page+1);else state.page=Number(b.dataset.page)||1;render();window.scrollTo({top:Math.max(0,$('.blog-results').getBoundingClientRect().top+scrollY-120),behavior:'smooth'})});$('#blogList').addEventListener('click',e=>{const b=e.target.closest('[data-action="details"]');if(!b)return;const row=e.target.closest('.blog-row');const item=state.master.find(x=>x.id===row?.dataset.id);if(item)openQuick(item)});$('#closeQuick').addEventListener('click',closeQuick);$('#quickDrawer').addEventListener('click',e=>{if(e.target.id==='quickDrawer')closeQuick()});document.addEventListener('keydown',e=>{if(e.key==='Escape')closeQuick()})}function syncChips(){$$('#quickTopics .topic-chip').forEach(c=>c.classList.toggle('is-active',c.dataset.topic===state.topic))}
initFilters();bind();applyFilters(true);
})();
</script>
<script defer src="header.js"></script><script defer src="footer.js"></script><script defer src="global.js"></script>
<div id="gees-footer-placeholder"></div>
