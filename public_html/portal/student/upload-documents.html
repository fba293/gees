<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Upload Documents | GEES Portal</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="/portal/shared/css/portal.css?v=13.0.0">
<link rel="stylesheet" href="/portal/shared/css/portal-crud.css?v=13.0.0">
<link rel="stylesheet" href="/portal/shared/css/gees-phase-core.css?v=13.0.0">
</head>
<body class="gees-portal-page">
<script>window.GEES_PORTAL_PAGE={"title":"Upload Documents","requiredRoles":["student","admin","super_admin"],"requiredPermission":"student.dashboard"};</script>
<div class="gees-portal-shell">
  <aside class="gees-portal-sidebar" data-portal-sidebar></aside>
  <div class="gees-portal-main">
    <header class="gees-portal-topbar" data-portal-topbar></header>
    <main class="gees-portal-content">

<section class="gees-page-hero"><div><span class="gees-kicker">Phase 13</span><h1>Upload Documents</h1><p>Upload real documents to Supabase Storage.</p></div></section>
<div data-phase-page="document-upload">
<section class="gees-panel gees-crud-panel"><div class="gees-panel-head"><h2>Upload file</h2></div>
<form class="gees-crud-form" data-form="document-upload"><div class="gees-crud-form-grid"><label>Document Type<select name="document_type"><option>Passport</option><option>Transcript</option><option>English Test</option><option>Bank Statement</option><option>Other</option></select></label><label>File<input type="file" name="file" required></label></div><div class="gees-crud-actions"><button class="gees-btn gees-btn-primary" type="submit">Upload</button><span class="gees-crud-status" data-status="document-upload"></span></div></form></section>
<section class="gees-panel"><div class="gees-panel-head"><h2>Your documents</h2></div><div class="gees-table-wrap"><table class="gees-table"><thead><tr><th>Document</th><th>Status</th><th>Date</th></tr></thead><tbody data-doc-table><tr><td colspan="3">Loading...</td></tr></tbody></table></div></section>
</div>

    </main>
  </div>
</div>
<div class="gees-portal-overlay" data-portal-overlay></div>
<div class="gees-toast-root" id="gees-toast-root"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" onerror="this.onerror=null;this.src='https://unpkg.com/@supabase/supabase-js@2';"></script>
<script src="/portal/shared/js/supabase-client.js?v=13.0.0"></script>
<script src="/portal/shared/js/demo-backend.js?v=13.0.0"></script>
<script src="/portal/shared/js/auth-service.js?v=13.0.0"></script>
<script src="/portal/shared/js/supabase-ready-bridge.js?v=13.0.0"></script>
<script src="/portal/shared/js/role-guard.js?v=13.0.0"></script>
<script src="/portal/shared/js/portal-shell.js?v=13.0.0"></script>
<script src="/portal/shared/js/portal-ui.js?v=13.0.0"></script>
<script src="/portal/shared/js/gees-phase-core.js?v=13.0.0"></script>
<script src="/portal/shared/js/phase13-document-upload.js?v=13.0.0"></script>
</body>
</html>
