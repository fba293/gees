<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Student Signup | GEES</title><link rel="stylesheet" href="/portal/shared/css/portal.css"></head><body><main class="gees-auth-shell"><section class="gees-auth-card"><h1>Create Student Account</h1><p>For testing: Supabase Email provider ON, Allow new users ON, Confirm email OFF.</p><form class="gees-form" data-signup-role="student"><label>Full name<input name="full_name" required></label><label>Email<input name="email" type="email" required></label><label>Phone<input name="phone"></label><label>Password<input name="password" type="password" minlength="6" required></label><button class="gees-btn" type="submit">Create account</button><div data-auth-status hidden></div></form><p><a href="/portal/auth/student-login.html">Already have account?</a></p></section></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/portal/shared/js/supabase-client.js"></script><script src="/portal/shared/js/auth-service.js"></script><script src="/portal/shared/js/auth-page.js"></script></body></html>
