<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Admin Login | GEES</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="/portal/shared/css/portal.css?v=10.3.0">
</head>
<body class="gees-auth-page">
<main class="gees-auth-card">
  <span class="gees-kicker">GEES Supabase Portal</span>
  <h1>Admin Login</h1>
  <p>Sign in with a real Supabase account. Demo credentials still work as a safe fallback during launch testing.</p>
  <form class="gees-auth-form" data-login-role="admin">
    <label>Email<input type="email" name="email" value="admin@gees.demo" autocomplete="username" required></label>
    <label>Password<input type="password" name="password" value="Admin@123" autocomplete="current-password" required></label>
    <button class="gees-btn gees-btn-primary" type="submit"><i class="fa-solid fa-right-to-bracket"></i> Sign In</button>
    <div class="gees-auth-error" data-auth-error role="alert"></div>
  </form>
  <div class="gees-demo-credentials"><strong>Demo fallback</strong><br>Email: admin@gees.demo<br>Password: Admin@123<br>Super Admin: super@gees.demo / Super@123</div>
  <p class="gees-auth-mini"><span>Admin users are created manually by GEES.</span></p>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/portal/shared/js/supabase-client.js?v=10.3.0"></script>
<script src="/portal/shared/js/demo-backend.js?v=10.3.0"></script>
<script src="/portal/shared/js/auth-service.js?v=10.3.0"></script>
<script src="/portal/shared/js/auth-page.js?v=10.3.0"></script>
</body>
</html>
