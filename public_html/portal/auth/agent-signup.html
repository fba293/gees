<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Agent Signup | GEES</title><link rel="stylesheet" href="/portal/shared/css/portal.css"></head><body><main class="gees-auth-shell"><section class="gees-auth-card"><h1>Agent Signup</h1><p>Signup submits a pending approval request. It will show only for a real Supabase admin/super_admin.</p><form class="gees-form" data-signup-role="agent"><label>Full name<input name="full_name" required></label><label>Agency name<input name="agency_name"></label><label>Country<input name="country"></label><label>Email<input name="email" type="email" required></label><label>Phone<input name="phone"></label><label>Password<input name="password" type="password" minlength="6" required></label><button class="gees-btn" type="submit">Create account</button><div data-auth-status hidden></div></form><p><a href="/portal/auth/agent-login.html">Already have account?</a></p></section></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/portal/shared/js/supabase-client.js"></script><script src="/portal/shared/js/auth-service.js"></script><script src="/portal/shared/js/auth-page.js"></script></body></html>
