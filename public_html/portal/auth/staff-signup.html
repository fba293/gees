<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Staff Signup | GEES</title><meta name="robots" content="noindex,nofollow"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"><link rel="stylesheet" href="/portal/shared/css/portal.css?v=15.0.0"><link rel="stylesheet" href="/portal/shared/css/portal-mobile.css?v=15.0.0"></head><body class="gees-auth-page"><main class="gees-auth-card"><span class="gees-kicker">GEES Staff Signup</span><h1>Request staff access</h1><p>Staff accounts are reviewed by GEES before access to internal workspaces is granted.</p><form class="gees-auth-form" data-signup-role="staff" novalidate><label>Full Name<input name="full_name" autocomplete="name" required></label><label>Email<input type="email" name="email" autocomplete="email" inputmode="email" required></label><label>Phone<input type="tel" name="phone" autocomplete="tel" inputmode="tel"></label><label>Team<select name="team_id"><option value="staff">General Staff</option><option value="ekhlas">Ekhlas Workspace</option><option value="maanisha">Maanisha Workspace</option><option value="rafshan">Rafshan Workspace</option><option value="seo">SEO Workspace</option></select></label><label>Title<input name="title" placeholder="Counselor, SEO Executive…"></label><label>Department<input name="department" placeholder="Admissions, Marketing…"></label><label>Password<input type="password" name="password" autocomplete="new-password" minlength="8" required></label><label>Confirm Password<input type="password" name="confirm_password" autocomplete="new-password" minlength="8" required></label><button class="gees-btn gees-btn-primary" type="submit"><i class="fa-solid fa-user-plus" aria-hidden="true"></i> Submit Request</button><div class="gees-auth-error" data-auth-status role="status" aria-live="polite"></div></form><p class="gees-auth-mini">Already registered? <a href="/portal/auth/staff-login.html">Go to login</a></p></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/portal/shared/js/supabase-client.js?v=15.0.0"></script><script src="/portal/shared/js/auth-service.js?v=15.0.0"></script><script src="/portal/shared/js/auth-page.js?v=15.0.0"></script></body></html>
