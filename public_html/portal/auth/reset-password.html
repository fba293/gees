<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Reset Password | GEES</title><link rel="stylesheet" href="/portal/shared/css/portal.css?v=13.0.0"></head>
<body class="gees-auth-page"><main class="gees-auth-card"><span class="gees-kicker">Phase 19</span><h1>Reset Password</h1><form class="gees-auth-form" id="resetForm"><label>Email<input type="email" name="email" required></label><button class="gees-btn gees-btn-primary" type="submit">Send Reset Link</button><div data-reset-status></div></form></main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/portal/shared/js/supabase-client.js?v=13.0.0"></script><script>
document.getElementById('resetForm').addEventListener('submit',async function(e){e.preventDefault();var email=new FormData(e.currentTarget).get('email');var c=window.GEESSupabase;if(window.GEESWaitForSupabaseClient)c=await window.GEESWaitForSupabaseClient();var r=await c.auth.resetPasswordForEmail(email,{redirectTo:location.origin+'/portal/auth/update-password.html'});document.querySelector('[data-reset-status]').textContent=r.error?r.error.message:'Reset link sent.'});
</script></body></html>
