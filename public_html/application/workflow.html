<body class="gees-portal-page">
<script>window.GEES_PORTAL_PAGE={"title":"Application Workflow","requiredRoles":["staff","admin","super_admin"],"requiredPermission":"staff.dashboard"};</script>
<div class="gees-portal-shell">
  <aside class="gees-portal-sidebar" data-portal-sidebar></aside>
  <div class="gees-portal-main">
    <header class="gees-portal-topbar" data-portal-topbar></header>
    <main class="gees-portal-content">

<section class="gees-page-hero"><div><span class="gees-kicker">Phase 14</span><h1 data-app-title>Application Workflow</h1><p>Status: <strong data-app-status>Loading...</strong></p></div></section>
<div data-phase-page="application-workflow">
<section class="gees-panel gees-crud-panel"><div class="gees-panel-head"><h2>Update status</h2></div>
<form class="gees-crud-form" data-form="workflow-status"><div class="gees-crud-form-grid"><label>Status<select name="status"><option value="under_review">Under Review</option><option value="documents_required">Documents Required</option><option value="offer_received">Offer Received</option><option value="visa_processing">Visa Processing</option><option value="approved">Approved</option><option value="rejected">Rejected</option></select></label><label>Note<input name="note" placeholder="Reason or next step"></label></div><div class="gees-crud-actions"><button class="gees-btn gees-btn-primary" type="submit">Update Workflow</button><span class="gees-crud-status" data-status="workflow"></span></div></form></section>
<section class="gees-panel"><div class="gees-panel-head"><h2>Timeline</h2></div><div class="gees-timeline" data-workflow-history>Loading...</div></section>
</div>

    </main>
  </div>
</div>
