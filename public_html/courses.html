<script>
(()=>{'use strict';
const SHEET_API_URL='https://script.google.com/macros/s/AKfycbxZchpNE9gS2Z8nVKJoGBq4Uip8i1rN2MN4usum0QBYD6pCUvGToSe4jo0L5aVg4Vpg/exec';
const LOGO_ROOT='images/university-logos/';
const $=(s,r=document)=>r.querySelector(s), $$=(s,r=document)=>Array.from(r.querySelectorAll(s));
const state={query:'',level:'',field:'',location:'',intake:'',offer:'',sort:'default',page:1,perPage:12,master:[],filtered:[],compare:[]};
const icons={uni:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18"/><path d="M5 21V8l7-4 7 4v13"/><path d="M9 21v-7h6v7"/></svg>',info:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>',fee:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7H14a3.5 3.5 0 0 1 0 7H6"/></svg>'};
function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}function norm(s){return String(s??'').toLowerCase().replace(/&amp;/g,'and').replace(/&/g,'and').replace(/[^a-z0-9]+/g,' ').trim()}function slug(s){return norm(s).replace(/\s+/g,'-')}function initials(s){return String(s||'U').split(/\s+/).filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase()}function money(n){const v=Number(n||0);return v?`MYR ${v.toLocaleString()}`:'Contact GEES'}
function normalizeCourse(c,i){const program=c.program||c.Program||c['Program Title']||c.course||c.name;const university=c.university||c.University||c.institution||c.uni; if(!program||!university)return null;const fee=Number(String(c.fee||c.Fee||c['Estimated 1st-Year Cost (MYR)']||c.tuition||'').replace(/[^0-9.]/g,''))||0;const city=c.city||c.location||c.Location||c.campus||'Malaysia';const level=c.level||c.Level||c['Level of Interest']||inferLevel(program);const field=c.field||c.Subject||c['Field of Study']||inferField(program);const intake=c.intake||c.Intake||'';const duration=c.duration||c.Duration||'';const offerLetter=c.offerLetter||c['Offer Letter Fee']||c.offer||'Free Offer Letter';return {id:String(c.id||c.ID||slug(`${program}-${university}-${i}`)),program:String(program).replace(/\s+/g,' ').trim(),university:String(university).replace(/\s+/g,' ').trim(),city:String(city).replace(/\s+/g,' ').trim(),country:c.country||countryFromCity(city),level,field,fee,duration,intake,offerLetter,href:c.href||c.url||`courses/${slug(university)}/${slug(program)}`,logo:c.logo||c.logoUrl||c.image||''}}
function inferLevel(p){const n=norm(p);if(/phd|doctor/.test(n))return'Doctoral Degree (PhD)';if(/master|mba|mphil/.test(n))return"Master's Degree";if(/diploma/.test(n))return'Diploma';if(/foundation|a level/.test(n))return'Foundation / A-level';return"Bachelor's Degree"}function inferField(p){const n=norm(p);if(/business|mba|finance|account|marketing|management/.test(n))return'Business & Management';if(/computer|software|data|cyber|information|it|ai/.test(n))return'Computer Science & IT';if(/engineer|mechanical|electrical|civil|manufacturing/.test(n))return'Engineering & Applied Sciences';if(/medicine|medical|health|nursing|pharmacy|dentistry/.test(n))return'Health & Medicine';if(/law|legal/.test(n))return'Law & Legal Studies';if(/design|architecture|drama|creative|art/.test(n))return'Art & Design';return'Other'}function countryFromCity(s){const n=String(s||''); if(/uk|united kingdom|london/i.test(n))return'United Kingdom'; if(/canada|toronto/i.test(n))return'Canada'; if(/australia|sydney/i.test(n))return'Australia'; return'Malaysia'}
function dedupe(items){const seen=new Set(),out=[];items.map(normalizeCourse).forEach(c=>{if(!c)return;const k=norm(`${c.program} ${c.university} ${c.level} ${c.city}`);if(seen.has(k))return;seen.add(k);out.push(c)});return out}
function getSeed(){try{return JSON.parse($('#courseData').textContent)||[]}catch(e){return[]}}
async function load(){state.master=dedupe(getSeed());setOptions();applyFilters(false);try{const res=await fetch(SHEET_API_URL,{cache:'no-store'});const json=await res.json();const rows=Array.isArray(json)?json:(json.courses||json.data||[]);if(rows.length){state.master=dedupe(rows.concat(state.master));setOptions();applyFilters(false)}}catch(e){}}
function setOptions(){const locations=[...new Set(state.master.map(c=>c.city).filter(Boolean))].sort();const levels=[...new Set(state.master.map(c=>c.level).filter(Boolean))].sort();const fields=[...new Set(state.master.map(c=>c.field).filter(Boolean))].sort();const intakes=[...new Set(state.master.flatMap(c=>String(c.intake||'').split(/,|&/).map(x=>x.trim()).filter(Boolean)))].sort();fill('#locationFilter',locations,'Select a location');fill('#topLocationFilter',locations,'All locations');fill('#levelFilter',levels,'Select level of interest');fill('#fieldFilter',fields,'Select field of study');fill('#intakeFilter',intakes,'Select intake')}function fill(sel,arr,label){const el=$(sel);if(!el)return;const val=el.value;el.innerHTML=`<option value="">${esc(label)}</option>`+arr.map(v=>`<option value="${esc(v)}">${esc(v)}</option>`).join('');el.value=arr.includes(val)?val:''}
function logoCandidates(c){const arr=[];if(c.logo)arr.push(c.logo);const folder=slug(c.country||'malaysia');const u=slug(c.university);arr.push(`${LOGO_ROOT}${folder}/${u}.png`,`${LOGO_ROOT}${folder}/${u}.webp`,`${LOGO_ROOT}${folder}/${u}.jpg`,`${LOGO_ROOT}malaysia/${u}.png`,`${LOGO_ROOT}malaysia/${u}.webp`);return [...new Set(arr)]}window.GEESCourseLogoFallback=function(img){let q=[];try{q=JSON.parse(img.dataset.candidates||'[]')}catch(e){}let idx=Number(img.dataset.index||0)+1;if(q[idx]){img.dataset.index=String(idx);img.src=q[idx];return}const p=img.parentElement;if(p){img.remove();const f=p.querySelector('.course-logo-fallback');if(f)f.style.display='grid'}}
function applyFilters(reset=true){if(reset)state.page=1;const q=norm(state.query);let list=state.master.filter(c=>{const hay=norm([c.program,c.university,c.city,c.level,c.field,c.intake,c.offerLetter].join(' '));if(q&&!q.split(' ').every(t=>hay.includes(t)))return false;if(state.location&&c.city!==state.location)return false;if(state.level&&c.level!==state.level)return false;if(state.field&&c.field!==state.field)return false;if(state.intake&&!norm(c.intake).includes(norm(state.intake)))return false;if(state.offer){const o=norm(c.offerLetter);if(state.offer==='Free Offer Letter'&&!o.includes('free offer'))return false;if(state.offer==='Offer Letter Fees'&&!o.includes('fee'))return false}return true});if(state.sort==='fee-asc')list.sort((a,b)=>(a.fee||Infinity)-(b.fee||Infinity));else if(state.sort==='fee-desc')list.sort((a,b)=>(b.fee||0)-(a.fee||0));else if(state.sort==='name-asc')list.sort((a,b)=>a.program.localeCompare(b.program));state.filtered=list;render()}
function render(){const total=state.filtered.length;const pages=Math.max(1,Math.ceil(total/state.perPage));if(state.page>pages)state.page=pages;const start=(state.page-1)*state.perPage;const page=state.filtered.slice(start,start+state.perPage);$('#totalCount').textContent=total;const active=[state.query&&`Search: “${esc(state.query)}”`,state.location&&`Location: ${esc(state.location)}`,state.level&&`Level: ${esc(state.level)}`,state.field&&`Field: ${esc(state.field)}`,state.intake&&`Intake: ${esc(state.intake)}`,state.offer&&esc(state.offer)].filter(Boolean).join(' · ');$('#activeFilterNote').innerHTML=(total?`Showing ${start+1}–${Math.min(start+state.perPage,total)} of ${total}`:'No courses found')+(active?' · '+active:'');$('#courseList').innerHTML=page.length?page.map(rowHTML).join(''):'<div class="empty-state"><div><h3>No courses found</h3><p>Try another programme title, level, field, location or intake.</p></div></div>';renderPagination(pages);renderCompareToolbar()}
function rowHTML(c){const cand=logoCandidates(c);const selected=state.compare.includes(c.id);return `<article class="course-row" data-id="${esc(c.id)}"><a class="course-logo-cell" href="${esc(c.href)}" aria-label="Open ${esc(c.program)}"><img src="${esc(cand[0]||'')}" data-candidates='${esc(JSON.stringify(cand))}' data-index="0" alt="${esc(c.university)} logo" loading="lazy" decoding="async" onerror="window.GEESCourseLogoFallback(this)"><span class="course-logo-fallback">${esc(initials(c.university))}</span></a><div class="course-info"><a class="course-name" href="${esc(c.href)}">${esc(c.program)}</a><div class="course-uni">${esc(c.university)}</div><div class="course-meta"><span>${icons.uni}${esc(c.city)}</span><span>${icons.info}<b>${esc(c.level)}</b>${c.field?' · '+esc(c.field):''}</span><span>${icons.fee}<b>${money(c.fee)}</b>/Year${c.offerLetter?' · '+esc(c.offerLetter):''}</span><span>${icons.info}${esc([c.duration,c.intake&&c.intake+' Intake'].filter(Boolean).join(' · '))}</span></div></div><div class="course-actions"><button class="mini-btn mini-btn--apply" type="button" data-action="apply">Apply Now</button><button class="mini-btn" type="button" data-action="ask">Ask Us</button><button class="mini-btn" type="button" data-action="details">Details</button><label class="compare-check"><input type="checkbox" data-action="compare" ${selected?'checked':''}> Compare</label></div></article>`}
function renderPagination(pages){const wrap=$('#pagination');if(pages<=1){wrap.innerHTML='';return}let html=`<button class="page-btn" data-page="prev" ${state.page===1?'disabled':''}>‹</button>`;let list=[];for(let p=1;p<=pages;p++){if(p===1||p===pages||Math.abs(p-state.page)<=1)list.push(p)}let last=0;list.forEach(p=>{if(last&&p-last>1)html+='<span class="page-btn" style="display:grid;place-items:center;border-color:transparent">…</span>';html+=`<button class="page-btn ${p===state.page?'is-active':''}" data-page="${p}">${p}</button>`;last=p});html+=`<button class="page-btn" data-page="next" ${state.page===pages?'disabled':''}>›</button>`;wrap.innerHTML=html}
function renderCompareToolbar(){const bar=$('#compareToolbar');bar.classList.toggle('is-visible',state.compare.length>0);$('#compareText').textContent=`${state.compare.length} course${state.compare.length===1?'':'s'} selected`}
function openCompare(){const chosen=state.compare.map(id=>state.master.find(x=>x.id===id)).filter(Boolean);if(!chosen.length)return;const rows=['University','Location','Tuition','Level','Field','Duration','Intake','Offer Letter'].map(label=>`<tr><td>${label}</td>${chosen.map(c=>`<td>${label==='University'?esc(c.university):label==='Location'?esc(c.city):label==='Tuition'?money(c.fee)+'/Year':label==='Level'?esc(c.level):label==='Field'?esc(c.field):label==='Duration'?esc(c.duration||'—'):label==='Intake'?esc(c.intake||'—'):esc(c.offerLetter||'—')}</td>`).join('')}</tr>`).join('');$('#compareGrid').innerHTML=`<table class="compare-table"><thead><tr><th>Feature</th>${chosen.map(c=>`<th>${esc(c.program)}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table>`;$('#compareModal').classList.add('is-open');$('#compareModal').setAttribute('aria-hidden','false')}
function closeCompare(){$('#compareModal').classList.remove('is-open');$('#compareModal').setAttribute('aria-hidden','true')}function openQuick(c){const cand=logoCandidates(c);$('#quickTitle').textContent=c.program;$('#quickBody').innerHTML=`<div class="quick-grid"><div class="course-logo-cell"><img src="${esc(cand[0]||'')}" data-candidates='${esc(JSON.stringify(cand))}' data-index="0" alt="${esc(c.university)} logo" onerror="window.GEESCourseLogoFallback(this)"><span class="course-logo-fallback">${esc(initials(c.university))}</span></div><div><h4 style="margin:0 0 8px;font-size:20px">${esc(c.university)}</h4><p style="margin:0;color:var(--c-soft);font-weight:700;line-height:1.6">📍 ${esc(c.city)}<br>🎓 ${esc(c.level)} · ${esc(c.field)}<br>💰 ${money(c.fee)}/Year<br>🗓 ${esc(c.duration||'—')} · ${esc(c.intake||'Any intake')}</p><div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap"><button class="mini-btn mini-btn--apply" data-quick-apply>Apply Now</button><button class="mini-btn" data-quick-ask>Ask Us</button></div></div></div>`;$('#quickDrawer').classList.add('is-open');$('#quickDrawer').setAttribute('aria-hidden','false');$('[data-quick-apply]')?.addEventListener('click',()=>openWA(`Hi GEES, I want to apply for ${c.program} at ${c.university}`));$('[data-quick-ask]')?.addEventListener('click',()=>openWA(`Hi GEES, I have a question about ${c.program} at ${c.university}`))}function closeQuick(){$('#quickDrawer').classList.remove('is-open');$('#quickDrawer').setAttribute('aria-hidden','true')}function openWA(text){window.open(`https://wa.me/601112376224?text=${encodeURIComponent(text)}`,'_blank','noopener')}
function bind(){$('#mobileFilterToggle').addEventListener('click',()=>$('#filterCard').classList.toggle('is-open'));$('#courseSearch').addEventListener('input',e=>{state.query=e.target.value.trim();applyFilters(true)});['level','field','location','intake','offer'].forEach(k=>{$(`#${k}Filter`).addEventListener('change',e=>{state[k]=e.target.value;if(k==='location')$('#topLocationFilter').value=state.location;applyFilters(true)})});$('#topLocationFilter').addEventListener('change',e=>{state.location=e.target.value;$('#locationFilter').value=state.location;applyFilters(true)});$('#sortFilter').addEventListener('change',e=>{state.sort=e.target.value;applyFilters(false)});$('#applyFilters').addEventListener('click',()=>applyFilters(true));$('#resetFilters').addEventListener('click',()=>{Object.assign(state,{query:'',level:'',field:'',location:'',intake:'',offer:'',sort:'default',page:1});['courseSearch','levelFilter','fieldFilter','locationFilter','topLocationFilter','intakeFilter','offerFilter','sortFilter'].forEach(id=>{const el=$('#'+id);if(el)el.value=id==='sortFilter'?'default':''});applyFilters(true)});$('#pagination').addEventListener('click',e=>{const b=e.target.closest('[data-page]');if(!b||b.disabled)return;const pages=Math.max(1,Math.ceil(state.filtered.length/state.perPage));if(b.dataset.page==='prev')state.page=Math.max(1,state.page-1);else if(b.dataset.page==='next')state.page=Math.min(pages,state.page+1);else state.page=Number(b.dataset.page)||1;render();window.scrollTo({top:Math.max(0,$('.course-results').getBoundingClientRect().top+scrollY-120),behavior:'smooth'})});$('#courseList').addEventListener('click',e=>{const row=e.target.closest('.course-row');if(!row)return;const c=state.master.find(x=>x.id===row.dataset.id);if(!c)return;const action=e.target.closest('[data-action]')?.dataset.action;if(action==='compare'){const input=e.target.closest('input');if(input.checked&&!state.compare.includes(c.id))state.compare.push(c.id);if(!input.checked)state.compare=state.compare.filter(id=>id!==c.id);if(state.compare.length>4){state.compare=state.compare.slice(0,4);input.checked=false;alert('You can compare up to 4 courses.')}renderCompareToolbar();return}if(action==='apply')return openWA(`Hi GEES, I want to apply for ${c.program} at ${c.university}`);if(action==='ask')return openWA(`Hi GEES, I have a question about ${c.program} at ${c.university}`);if(action==='details')return openQuick(c)});$('#openCompare').addEventListener('click',openCompare);$('#clearCompare').addEventListener('click',()=>{state.compare=[];render()});$('#closeCompare').addEventListener('click',closeCompare);$('#compareModal').addEventListener('click',e=>{if(e.target.id==='compareModal')closeCompare()});$('#closeQuick').addEventListener('click',closeQuick);$('#quickDrawer').addEventListener('click',e=>{if(e.target.id==='quickDrawer')closeQuick()});document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeCompare();closeQuick()}})}
bind();load();
})();
</script>
