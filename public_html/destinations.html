<title>Study Destinations | GEES — Global Education Expert Services</title>
<meta content="Explore study destinations with GEES. Search by country, filter by region, shortlist destinations, and compare your next study abroad pathway." name="description"/>

<link href="https://globaleducationexpert.com/destinations.html" rel="canonical"/>
<script>
(() => {
  try {
    const saved = localStorage.getItem('gees_theme');
    const dark = saved === 'dark' || (!saved && matchMedia('(prefers-color-scheme: dark)').matches);
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  } catch (error) {}
})();
</script>

<style>

}
.mobile-filter-btn { display: none; }

}

  min-height: 132px; border: 1px solid var(--line); border-radius: 24px; background: var(--panel);

}

}
.destination-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }

}

}

.explore-btn { min-height: 38px; padding: 0 14px; font-size: 13px; }

.page-btn {

}

  padding: clamp(28px, 7vw, 64px) 18px; box-shadow: var(--shadow-sm);
}

.empty-actions { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
.drawer-backdrop { position: fixed; inset: 0; background: rgba(15,23,42,.48); z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 200ms ease; }
.drawer-backdrop.open { opacity: 1; pointer-events: auto; }
.detail-drawer {
  position: fixed; top: 0; right: 0; bottom: 0; z-index: 1001; width: min(520px, 100vw); background: var(--panel);
  box-shadow: -24px 0 64px rgba(15,23,42,.20); transform: translateX(104%); transition: transform 260ms var(--ease);

}
.detail-drawer.open { transform: none; }
.drawer-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: calc(20px + env(safe-area-inset-top)) 20px 14px; border-bottom: 1px solid var(--line); }
.drawer-head strong { font-size: 17px; letter-spacing: -.03em; }
.drawer-body { padding: 20px; overflow-y: auto; }
.drawer-hero { display: grid; gap: 14px; margin-bottom: 18px; }
.drawer-image { width: 100%; aspect-ratio: 16/10; border-radius: 22px; overflow: hidden; border: 1px solid var(--line); background:#fff; }
.drawer-image img { width:100%; height:100%; object-fit: cover; display:block; }
.drawer-hero h2 { margin: 0; font-size: 1.7rem; line-height: 1.12; letter-spacing: -.04em; }
.drawer-hero p { margin: 6px 0 0; color: var(--muted); font-weight: 750; }
.detail-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin: 16px 0; }

.detail-tile span { display: block; color: var(--muted); font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: .06em; }
.detail-tile strong { display: block; margin-top: 5px; font-size: 14px; overflow-wrap: anywhere; }
.drawer-actions { display: grid; gap: 10px; margin-top: 16px; }
.toast {

  background: var(--text); color: var(--bg); border-radius: 999px; padding: 11px 15px; font-size: 13px; font-weight: 900;
  transition: transform 260ms var(--ease), opacity 180ms ease; box-shadow: var(--shadow-lg); pointer-events: none;
}
.toast.show { transform: translate(-50%, 0); opacity: 1; }
.mobile-sheet {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 1002; background: var(--panel); border-radius: 28px 28px 0 0;
  box-shadow: 0 -22px 60px rgba(15,23,42,.20); border-top: 1px solid var(--line);
  padding: 10px 16px calc(18px + env(safe-area-inset-bottom)); transform: translateY(104%); transition: transform 240ms var(--ease); display: none;
}

.sheet-handle { width: 48px; height: 5px; border-radius: 999px; background: color-mix(in srgb, var(--muted), transparent 40%); margin: 0 auto 12px; }
@media (max-width: 1100px) {
  .dest-layout { grid-template-columns: 290px minmax(0, 1fr); gap: 16px; }
  .destination-card { grid-template-columns: 104px minmax(0, 1fr); }
  .destination-cover { width: 104px; height: 82px; border-radius: 18px; }
  .dest-side { grid-column: 2; min-width: 0; display: flex; justify-content: space-between; align-items: center; width: 100%; }
}
@media (max-width: 860px) {
  .dest-app { width: min(100% - 22px, var(--page-max)); padding-top: calc(var(--header-safe) + 8px); padding-bottom: 24px; }
  .dest-layout { display: block; }
  .search-rail { position: relative; top: auto; min-height: auto; border-radius: 24px; padding: 12px; gap: 10px; margin-bottom: 10px; }
  .rail-title h1 { font-size: 1.42rem; }
  .rail-title span { width: 38px; height: 38px; border-radius: 14px; }
  .rail-caption, .desktop-only { display: none !important; }
  .filter-stack { display: none; }
  .quick-regions { overflow-x: auto; flex-wrap: nowrap; padding-bottom: 2px; scrollbar-width: none; }
  .quick-regions::-webkit-scrollbar { display: none; }
  .rail-actions { grid-template-columns: 1fr 1fr; }
  .rail-actions .btn { min-height: 42px; font-size: 13px; padding: 10px 12px; }
  .search-box { min-height: 50px; border-radius: 17px; }
  .results-toolbar { margin-bottom: 10px; border-radius: 20px; padding: 10px; }
  .result-title strong { font-size: 15px; }
  .result-title span { font-size: 11px; }
  .sort-select { display: none; }
  .mobile-filter-btn { display: inline-flex; min-height: 38px; padding: 0 12px; font-size: 13px; }
  .saved-pill { min-height: 38px; width: 38px; padding: 0; justify-content: center; }
  .saved-pill span { display: none; }
  .destination-list { gap: 10px; }
  .destination-card { grid-template-columns: 78px minmax(0, 1fr); gap: 11px; min-height: auto; padding: 11px; border-radius: 20px; align-items: start; }
  .destination-cover { width: 78px; height: 62px; border-radius: 16px; }
  .dest-meta { margin-bottom: 5px; gap: 5px; }
  .badge { min-height: 21px; padding: 3px 7px; font-size: 10px; }
  .dest-name { font-size: .98rem; line-height: 1.23; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .dest-line { font-size: 12.5px; margin-top: 4px; }
  .dest-small { margin-top: 7px; gap: 8px; font-size: 11px; }
  .dest-side { grid-column: 1 / -1; padding-left: 89px; gap: 8px; }
  .explore-btn { min-height: 35px; padding: 0 12px; font-size: 12px; }
  .small-action { width: 35px; height: 35px; }
  .card-actions { gap: 6px; }
  .mobile-sheet { display: block; }
  .detail-drawer { width: 100vw; }
  .drawer-body { padding: 16px; }
  .detail-grid { grid-template-columns: 1fr; }
}
@media (max-width: 420px) {
  .dest-app { width: min(100% - 16px, var(--page-max)); }
  .search-rail { padding: 10px; }
  .destination-card { grid-template-columns: 66px minmax(0, 1fr); padding: 10px; gap: 10px; }
  .destination-cover { width: 66px; height: 54px; border-radius: 14px; }
  .dest-side { padding-left: 76px; }
  .dest-name { font-size: .93rem; }
}
@media (max-width: 920px) and (orientation: landscape) {
  .dest-app { padding-top: calc(var(--header-safe) + 6px); }
  .search-rail { grid-template-columns: 1fr 1fr; align-items: start; }
  .quick-regions, .rail-actions { grid-column: 1 / -1; }
}
@media (prefers-reduced-motion: reduce) {
  html { scroll-behavior: auto; }
  *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; transition-duration: .001ms !important; }
}

:root{--d-bg:#fff;--d-surface:#fff;--d-soft-surface:#fff8ea;--d-text:#101522;--d-soft:#4b5567;--d-muted:#7b8496;--d-border:#141927;--d-line:rgba(16,21,34,.18);--d-line-soft:rgba(16,21,34,.10);--d-yellow:#ffcc69;--d-blue:#2563eb;--d-green:#16a34a;--d-shadow:0 18px 50px rgba(16,21,34,.08);--d-header-safe:var(--gees-header-safe,104px)}

    });

    items = items.sort((a, b) => {
      if (state.sort === 'name-desc') return b.name.localeCompare(a.name);
      if (state.sort === 'region-asc') return a.region.localeCompare(b.region) || a.name.localeCompare(b.name);
      if (state.sort === 'saved-first') return Number(state.saved.includes(Number(b.id))) - Number(state.saved.includes(Number(a.id))) || a.name.localeCompare(b.name);
      return a.name.localeCompare(b.name);
    });

    return items;
  }

  function showToast(message) {
    if (!els.toast) return;
    els.toast.textContent = message;
    els.toast.classList.add('show');
    clearTimeout(showToast.timer);
    showToast.timer = setTimeout(() => els.toast.classList.remove('show'), 1800);
  }

  function persistSaved() {
    localStorage.setItem('gees_destination_shortlist_v2', JSON.stringify(state.saved));
  }

  function updateSavedButton() {
    if (els.savedCount) els.savedCount.textContent = state.saved.length;
    els.savedButton?.classList.toggle('has-items', state.saved.length > 0);
  }

  function toggleSaved(id) {
    id = Number(id);
    const item = findDestination(id);
    if (!item) return;
    if (state.saved.includes(id)) {
      state.saved = state.saved.filter((value) => value !== id);
      showToast(`${item.name} removed from shortlist`);
    } else {
      if (state.saved.length >= 10) {
        showToast('Shortlist limit: 10 destinations');
        return;
      }
      state.saved.push(id);
      showToast(`${item.name} saved to shortlist`);
    }
    persistSaved();
    updateSavedButton();
    render();
  }

  function renderNotice(total) {
    const parts = [];
    if (state.query) parts.push(`Search: “${escapeHTML(state.query)}”`);
    if (state.region) parts.push(`Region: ${escapeHTML(state.region)}`);
    if (state.destination) parts.push(`Destination: ${escapeHTML(state.destination)}`);
    if (state.savedOnly) parts.push('Showing saved only');
    if (!parts.length) {
      els.activeNotice?.classList.remove('show');
      if (els.activeNotice) els.activeNotice.innerHTML = '';
      return;
    }
    if (els.activeNotice) {
      els.activeNotice.innerHTML = `<span>${parts.join(' · ')}<\/span><button class="btn btn-ghost" type="button" id="clearActiveFilters">Clear filters<\/button>`;
      els.activeNotice.classList.add('show');
      $('clearActiveFilters')?.addEventListener('click', resetFilters);
    }
  }

  function cardHTML(item) {
    const saved = state.saved.includes(Number(item.id));
    return `<article class="destination-card" data-id="${item.id}">
      <div class="destination-cover"><img src="${escapeHTML(item.img)}" alt="${escapeHTML(item.name)} destination" loading="lazy" decoding="async" referrerpolicy="no-referrer" data-fallback="${fallbackImage(item.name)}"><\/div>
      <div class="dest-main">
        <div class="dest-meta"><span class="badge gold">${escapeHTML(item.flag)} Study destination<\/span><span class="badge">${escapeHTML(item.region)}<\/span><\/div>
        <h2 class="dest-name">${escapeHTML(item.name)}<\/h2>
      <\/div>
      <div class="dest-side">
        <div class="card-actions">
          <button class="small-action ${saved ? 'active' : ''}" data-action="save" data-id="${item.id}" type="button" aria-label="${saved ? 'Remove' : 'Save'} ${escapeHTML(item.name)}"><i class="${saved ? 'fas' : 'far'} fa-heart"><\/i><\/button>
          <button class="small-action" data-action="details" data-id="${item.id}" type="button" aria-label="View ${escapeHTML(item.name)} details"><i class="fas fa-circle-info"><\/i><\/button>
        <\/div>
        <a class="btn btn-primary explore-btn" href="${escapeHTML(item.url)}">Explore <i class="fas fa-arrow-right"><\/i><\/a>
      <\/div>
    <\/article>`;
  }

  function emptyHTML() {
    return `<section class="empty-state"><i class="fas fa-map-location-dot" aria-hidden="true"><\/i><h2>No destinations found<\/h2><p>Try a different country name, region, or clear your saved-only filter.<\/p><div class="empty-actions"><button class="btn btn-primary" id="emptyResetBtn" type="button">Reset filters<\/button><\/div><\/section>`;
  }

  function renderPagination(total) {
    const totalPages = Math.max(1, Math.ceil(total / PER_PAGE));
    state.page = Math.min(Math.max(1, state.page), totalPages);
    if (!els.pagination || totalPages <= 1) {
      if (els.pagination) els.pagination.innerHTML = '';
      return;
    }

    const pages = [];
    pages.push(`<button class="page-btn" data-page="prev" ${state.page === 1 ? 'disabled' : ''}>Prev<\/button>`);
    for (let i = 1; i <= totalPages; i += 1) {
      if (i === 1 || i === totalPages || Math.abs(i - state.page) <= 1) {
        pages.push(`<button class="page-btn ${i === state.page ? 'active' : ''}" data-page="${i}">${i}<\/button>`);
      } else if (pages[pages.length - 1] !== '<span class="page-gap">…<\/span>') {
        pages.push('<span class="page-gap">…<\/span>');
      }
    }
    pages.push(`<button class="page-btn" data-page="next" ${state.page === totalPages ? 'disabled' : ''}>Next<\/button>`);
    els.pagination.innerHTML = pages.join('');
  }

  function render() {
    const filtered = getFiltered();
    const total = filtered.length;
    const totalPages = Math.max(1, Math.ceil(total / PER_PAGE));
    state.page = Math.min(Math.max(1, state.page), totalPages);
    const start = (state.page - 1) * PER_PAGE;
    const pageItems = filtered.slice(start, start + PER_PAGE);

    if (els.title) els.title.textContent = `${total} destination${total === 1 ? '' : 's'} found`;
    if (els.subline) els.subline.textContent = 'Use search and filters to shortlist faster.';
    renderNotice(total);

    if (els.container) {
      els.container.innerHTML = pageItems.length ? pageItems.map(cardHTML).join('') : emptyHTML();
      els.container.querySelectorAll('img[data-fallback]').forEach((img) => {
        img.addEventListener('error', () => {
          if (img.dataset.fallback && img.src !== img.dataset.fallback) img.src = img.dataset.fallback;
        }, { once: true });
      });
      els.container.querySelectorAll('[data-action="save"]').forEach((button) => button.addEventListener('click', () => toggleSaved(button.dataset.id)));
      els.container.querySelectorAll('[data-action="details"]').forEach((button) => button.addEventListener('click', () => openDetails(button.dataset.id)));
      $('emptyResetBtn')?.addEventListener('click', resetFilters);
    }

    renderPagination(total);
    updateSavedButton();
    updateSchema(filtered.slice(0, 12));
  }

  function openDetails(id) {
    const item = findDestination(id);
    if (!item || !els.drawer || !els.drawerBody) return;
    const saved = state.saved.includes(Number(item.id));
    els.drawerTitle.textContent = `${item.name} details`;
    els.drawerBody.innerHTML = `<div class="drawer-hero">
      <div class="drawer-image"><img src="${escapeHTML(item.img)}" alt="${escapeHTML(item.name)}" referrerpolicy="no-referrer" data-fallback="${fallbackImage(item.name)}"><\/div>
      <div><h2>${escapeHTML(item.flag)} ${escapeHTML(item.name)}<\/h2><p>${escapeHTML(item.region)} study destination with GEES guidance.<\/p><\/div>
    <\/div>
    <div class="detail-grid">
      <div class="detail-tile"><span>Region<\/span><strong>${escapeHTML(item.region)}<\/strong><\/div>
      <div class="detail-tile"><span>Support<\/span><strong>Admission, visa, courses<\/strong><\/div>
      <div class="detail-tile"><span>Shortlist<\/span><strong>${saved ? 'Saved' : 'Not saved'}<\/strong><\/div>
      <div class="detail-tile"><span>Page<\/span><strong>${escapeHTML(item.url)}<\/strong><\/div>
    <\/div>
    <div class="drawer-actions">
      <a class="btn btn-primary" href="${escapeHTML(item.url)}"><i class="fas fa-arrow-right"><\/i> Explore destination<\/a>
      <button class="btn btn-soft" id="drawerSaveBtn" type="button"><i class="${saved ? 'fas' : 'far'} fa-heart"><\/i> ${saved ? 'Remove from shortlist' : 'Save to shortlist'}<\/button>
      <a class="btn btn-ghost" href="contact-us.html"><i class="fas fa-headset"><\/i> Ask GEES<\/a>
    <\/div>`;
    els.drawerBody.querySelector('img[data-fallback]')?.addEventListener('error', (event) => {
      const img = event.currentTarget;
      if (img.dataset.fallback && img.src !== img.dataset.fallback) img.src = img.dataset.fallback;
    }, { once: true });
    $('drawerSaveBtn')?.addEventListener('click', () => { toggleSaved(item.id); openDetails(item.id); });
    openDrawer();
  }

  function openDrawer() {
    els.drawer?.classList.add('open');
    els.drawer?.setAttribute('aria-hidden', 'false');
    els.drawerBackdrop?.classList.add('open');
    document.body.classList.add('drawer-open');
  }

  function closeDrawer() {
    els.drawer?.classList.remove('open');
    els.drawer?.setAttribute('aria-hidden', 'true');
    els.drawerBackdrop?.classList.remove('open');
    els.mobileSheet?.classList.remove('open');
    document.body.classList.remove('drawer-open');
  }

  function resetFilters() {
    state.query = '';
    state.region = '';
    state.destination = '';
    state.savedOnly = false;
    state.sort = 'name-asc';
    state.page = 1;
    if (els.search) els.search.value = '';
    if (els.region) els.region.value = '';
    if (els.destination) els.destination.value = '';
    if (els.sort) els.sort.value = 'name-asc';
    if (els.savedOnly) els.savedOnly.checked = false;
    document.querySelectorAll('.chip[data-region]').forEach((chip) => chip.classList.toggle('active', chip.dataset.region === ''));
    syncMobileFiltersFromDesktop();
    render();
  }

  function updateSchema(items) {
    const schema = $('destSchema');
    if (!schema) return;
    schema.textContent = JSON.stringify({
      '@context': 'https://schema.org',
      '@type': 'ItemList',
      itemListElement: items.map((item, index) => ({
        '@type': 'ListItem',
        position: index + 1,
        url: item.url,
        name: item.name
      }))
    });
  }

  els.search?.addEventListener('input', () => { state.query = els.search.value; state.page = 1; els.clear.style.visibility = state.query ? 'visible' : 'hidden'; render(); });
  els.clear?.addEventListener('click', () => { state.query = ''; els.search.value = ''; els.clear.style.visibility = 'hidden'; state.page = 1; render(); });
  els.region?.addEventListener('change', () => { state.region = els.region.value; state.page = 1; syncMobileFiltersFromDesktop(); render(); });
  els.destination?.addEventListener('change', () => { state.destination = els.destination.value; state.page = 1; syncMobileFiltersFromDesktop(); render(); });
  els.sort?.addEventListener('change', () => { state.sort = els.sort.value; state.page = 1; render(); });
  els.savedOnly?.addEventListener('change', () => { state.savedOnly = els.savedOnly.checked; state.page = 1; render(); });
  els.reset?.addEventListener('click', resetFilters);
  els.searchNow?.addEventListener('click', render);
  document.querySelectorAll('.chip[data-region]').forEach((chip) => chip.addEventListener('click', () => {
    state.region = chip.dataset.region || '';
    state.page = 1;
    if (els.region) els.region.value = state.region;
    document.querySelectorAll('.chip[data-region]').forEach((item) => item.classList.toggle('active', item === chip));
    syncMobileFiltersFromDesktop();
    render();
  }));

  els.savedButton?.addEventListener('click', () => {
    state.savedOnly = !state.savedOnly;
    if (els.savedOnly) els.savedOnly.checked = state.savedOnly;
    state.page = 1;
    render();
  });

  els.pagination?.addEventListener('click', (event) => {
    const button = event.target.closest('[data-page]');
    if (!button || button.disabled) return;
    const totalPages = Math.max(1, Math.ceil(getFiltered().length / PER_PAGE));
    if (button.dataset.page === 'prev') state.page = Math.max(1, state.page - 1);
    else if (button.dataset.page === 'next') state.page = Math.min(totalPages, state.page + 1);
    else state.page = Number(button.dataset.page);
    render();
    window.scrollTo({ top: Math.max(0, document.querySelector('.results-shell').offsetTop - 110), behavior: 'smooth' });
  });

  els.openMobileFilters?.addEventListener('click', () => { syncMobileFiltersFromDesktop(); els.mobileSheet?.classList.add('open'); els.drawerBackdrop?.classList.add('open'); document.body.classList.add('drawer-open'); });
  els.closeMobileFilters?.addEventListener('click', closeDrawer);
  els.applyMobileFilters?.addEventListener('click', () => {
    state.region = els.sheetRegion?.value || '';
    state.destination = els.sheetDestination?.value || '';
    if (els.region) els.region.value = state.region;
    if (els.destination) els.destination.value = state.destination;
    document.querySelectorAll('.chip[data-region]').forEach((chip) => chip.classList.toggle('active', chip.dataset.region === state.region));
    state.page = 1;
    closeDrawer();
    render();
  });
  els.closeDrawer?.addEventListener('click', closeDrawer);
  els.drawerBackdrop?.addEventListener('click', closeDrawer);
  document.addEventListener('keydown', (event) => { if (event.key === 'Escape') closeDrawer(); });

  populateFilters();
  syncMobileFiltersFromDesktop();
  if (els.clear) els.clear.style.visibility = 'hidden';
  render();
})();
</script></main>
